<!DOCTYPE html><html><head><title>BlackRoad Canvas</title>
<style>*{margin:0;box-sizing:border-box}body{background:#0a0a0a;overflow:hidden}
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:#131313;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;padding:0 16px;gap:8px;z-index:10}
#toolbar span{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#f5f5f5;margin-right:16px}
.tool{width:32px;height:32px;border-radius:6px;border:1px solid #1a1a1a;background:none;color:#525252;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tool:hover{border-color:#262626;color:#a3a3a3}.tool.active{border-color:#404040;color:#f5f5f5;background:#1a1a1a}
canvas{display:block;cursor:crosshair}
#colors{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
.swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.swatch.active{border-color:#f5f5f5}
</style><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"></head>
<body>
<div id="toolbar"><span>Canvas</span>
<button class="tool active" id="brush" onclick="setTool('brush')">B</button>
<button class="tool" id="line" onclick="setTool('line')">L</button>
<button class="tool" id="rect" onclick="setTool('rect')">R</button>
<button class="tool" id="circle" onclick="setTool('circle')">O</button>
<button class="tool" id="eraser" onclick="setTool('eraser')">E</button>
<input type="range" min="1" max="20" value="3" id="size" style="width:80px;margin-left:16px">
<button class="tool" onclick="clearCanvas()" style="margin-left:auto;font-size:11px;width:auto;padding:0 10px">Clear</button>
<button class="tool" onclick="save()" style="font-size:11px;width:auto;padding:0 10px">Save</button>
</div>
<div id="colors"></div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById("c"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,c.width,c.height);
let tool="brush",color="#f5f5f5",drawing=false,lx,ly;
const colors=["#f5f5f5","#a3a3a3","#525252","#FF6B2B","#FF2255","#CC00AA","#8844FF","#4488FF","#00D4FF","#0a0a0a"];
document.getElementById("colors").innerHTML=colors.map((cl,i)=>'<div class="swatch'+(i===0?' active':'')+'" style="background:'+cl+'" onclick="setColor(this,\''+cl+'\')"></div>').join("");
function setTool(t){tool=t;document.querySelectorAll(".tool").forEach(b=>b.classList.remove("active"));document.getElementById(t)?.classList.add("active")}
function setColor(el,cl){color=cl;document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("active"));el.classList.add("active")}
function clearCanvas(){ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,c.width,c.height)}
function save(){const a=document.createElement("a");a.download="canvas.png";a.href=c.toDataURL();a.click()}
c.addEventListener("mousedown",e=>{drawing=true;lx=e.clientX;ly=e.clientY;if(tool==="brush"||tool==="eraser"){ctx.beginPath();ctx.moveTo(lx,ly)}});
c.addEventListener("mousemove",e=>{if(!drawing)return;const x=e.clientX,y=e.clientY,s=parseInt(document.getElementById("size").value);
if(tool==="brush"){ctx.strokeStyle=color;ctx.lineWidth=s;ctx.lineCap="round";ctx.lineTo(x,y);ctx.stroke()}
else if(tool==="eraser"){ctx.strokeStyle="#0a0a0a";ctx.lineWidth=s*3;ctx.lineCap="round";ctx.lineTo(x,y);ctx.stroke()}
lx=x;ly=y});
c.addEventListener("mouseup",e=>{if(!drawing)return;drawing=false;const x=e.clientX,y=e.clientY,s=parseInt(document.getElementById("size").value);
if(tool==="line"){ctx.strokeStyle=color;ctx.lineWidth=s;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke()}
else if(tool==="rect"){ctx.strokeStyle=color;ctx.lineWidth=s;ctx.strokeRect(Math.min(lx,x),Math.min(ly,y),Math.abs(x-lx),Math.abs(y-ly))}
else if(tool==="circle"){const r=Math.sqrt((x-lx)**2+(y-ly)**2);ctx.strokeStyle=color;ctx.lineWidth=s;ctx.beginPath();ctx.arc(lx,ly,r,0,Math.PI*2);ctx.stroke()}});
addEventListener("resize",()=>{const img=ctx.getImageData(0,0,c.width,c.height);c.width=innerWidth;c.height=innerHeight;ctx.putImageData(img,0,0)});
</script></body></html>
